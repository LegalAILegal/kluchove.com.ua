server {
    listen 80;
    server_name kluchove.com.ua www.kluchove.com.ua;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name kluchove.com.ua www.kluchove.com.ua;

    ssl_certificate /etc/letsencrypt/live/kluchove.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kluchove.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
}
